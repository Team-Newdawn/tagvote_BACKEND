name: Task
description: 구현, 리팩터링, 문서화 같은 내부 작업을 정리합니다.
title: "[Task] "
labels:
  - task
body:
  - type: input
    id: summary
    attributes:
      label: 작업 요약
      placeholder: 예) public API 명세 문서 최신화
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: 작업 목표
      description: 이 작업으로 무엇을 끝내려는지 적어주세요.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 포함/제외 범위를 명확히 적어주세요.
      placeholder: |
        포함:
        - ...

        제외:
        - ...
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: 체크리스트
      description: 해야 할 일을 체크리스트로 정리해주세요.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: note
    attributes:
      label: 참고 사항
      description: 관련 API, DB, 배포 영향도 등을 적어주세요.

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - high
        - medium
        - low
    validations:
      required: true
