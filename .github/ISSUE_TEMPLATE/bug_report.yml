name: Bug Report
description: 버그 재현 정보와 기대 동작을 정리합니다.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        재현 가능한 정보 위주로 적어주세요. 에러 로그, 요청 URL, 화면 캡처가 있으면 같이 첨부해주세요.

  - type: input
    id: summary
    attributes:
      label: 요약
      description: 어떤 문제가 발생했는지 한 줄로 적어주세요.
      placeholder: 예) 태그 삭제 요청 시 403이 반환됨
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 환경
      description: 어디서 문제가 발생했는지 적어주세요.
      placeholder: |
        - Environment: dev / prod
        - Client: admin / participant / player
        - Browser / Device:
        - API Base URL:
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      description: 순서대로 적어주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      placeholder: 예) 삭제 성공 후 204가 반환되어야 함
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
      placeholder: 예) 403 Forbidden 반환, [ERROR] DELETE /api/public/tags/42 ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 로그 / 스크린샷
      description: 서버 로그, 브라우저 콘솔, 스크린샷 등을 붙여주세요.
      render: shell

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - high
        - medium
        - low
    validations:
      required: true
